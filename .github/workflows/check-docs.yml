name: Check docs

on:
  push:
    branches: [main, master]
    paths: ['**.md']
  pull_request:
    branches: [main, master]
    paths: ['**.md']

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run check-docs
